# Lighthouse CI — roda em todo push pra main e em PRs que tocam o SPA.
# Falha se algum dos thresholds da auditoria (aba 07) for violado.
# Os relatórios ficam disponíveis como artefatos do run.
name: Lighthouse CI

on:
  push:
    branches: [main]
    paths:
      - 'blaxx-spa/**'
      - '.github/workflows/lighthouse.yml'
  pull_request:
    paths:
      - 'blaxx-spa/**'
      - '.github/workflows/lighthouse.yml'

jobs:
  lighthouse:
    name: Audit (mobile + desktop)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blaxx-spa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: blaxx-spa/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Build SPA
        run: npm run build
      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          configPath: ./blaxx-spa/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
