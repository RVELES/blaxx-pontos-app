<?xml version="1.0" encoding="UTF-8"?>
<!--
  Open Graph image — 1200×630 (proporção 1.91:1, padrão Facebook/Twitter).
  SVG é leve (<5 KB), nítido em qualquer DPR, e o Netlify serve com Content-Type
  correto pra preview. Quando quiser substituir por raster: converter pra .png
  com `rsvg-convert og-image.svg -o og-image.png -w 1200 -h 630`.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background dark com gradient sutil pra dar profundidade -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C6FF00" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C6FF00" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="960" cy="315" r="280" fill="url(#glow)"/>

  <!-- Logo: B-mark + wordmark "BlaXx" -->
  <g transform="translate(72, 252)">
    <!-- B-mark lime square -->
    <rect width="96" height="96" rx="20" fill="#C6FF00"/>
    <text x="48" y="68" font-family="'Space Grotesk', system-ui, sans-serif"
          font-size="64" font-weight="800" fill="#0A0A0A"
          text-anchor="middle">B</text>
  </g>

  <!-- Wordmark + tagline -->
  <g transform="translate(192, 270)">
    <text font-family="'Space Grotesk', system-ui, sans-serif"
          font-size="68" font-weight="800" letter-spacing="-2"
          fill="#FFFFFF">
      <tspan>Bla</tspan><tspan fill="#C6FF00">X</tspan><tspan fill="#C6FF00">x</tspan>
      <tspan dx="14" font-weight="500" fill="#A8A8A8" font-size="56">Rewards</tspan>
    </text>
    <text y="68" font-family="'Space Grotesk', system-ui, sans-serif"
          font-size="34" font-weight="500" fill="#FFFFFF" opacity="0.7">
      pontos viram Pix · cashback premium do Brasil
    </text>
    <text y="118" font-family="'Space Grotesk', system-ui, sans-serif"
          font-size="22" font-weight="600" fill="#C6FF00"
          letter-spacing="1">
      blaxxpontos.com.br
    </text>
  </g>

  <!-- Globo lime decorativo (canto direito) -->
  <g transform="translate(960, 315)" opacity="0.85">
    <circle r="180" fill="none" stroke="#C6FF00" stroke-width="2" opacity="0.4"/>
    <circle r="180" fill="#0A0A0A"/>
    <!-- Meridianos sutis -->
    <ellipse cx="0" cy="0" rx="120" ry="180" fill="none" stroke="#C6FF00" stroke-width="1" opacity="0.25"/>
    <ellipse cx="0" cy="0" rx="60" ry="180" fill="none" stroke="#C6FF00" stroke-width="1" opacity="0.18"/>
    <line x1="-180" y1="0" x2="180" y2="0" stroke="#C6FF00" stroke-width="1" opacity="0.22"/>
    <line x1="-180" y1="-60" x2="180" y2="-60" stroke="#C6FF00" stroke-width="1" opacity="0.12"/>
    <line x1="-180" y1="60" x2="180" y2="60" stroke="#C6FF00" stroke-width="1" opacity="0.12"/>
    <!-- 5 destinos brilhando como pontos lime -->
    <circle cx="-70" cy="-50" r="6" fill="#C6FF00"/>
    <circle cx="80" cy="-20" r="6" fill="#C6FF00"/>
    <circle cx="40" cy="70" r="6" fill="#C6FF00"/>
    <circle cx="-90" cy="40" r="6" fill="#C6FF00"/>
    <circle cx="120" cy="80" r="6" fill="#C6FF00"/>
  </g>

  <!-- Selo "sem mensalidade" no rodapé direito -->
  <g transform="translate(870, 560)">
    <rect width="270" height="48" rx="24" fill="rgba(198,255,0,0.14)"
          stroke="#C6FF00" stroke-width="1.5"/>
    <text x="135" y="32" font-family="'Space Grotesk', system-ui, sans-serif"
          font-size="20" font-weight="700" fill="#C6FF00"
          text-anchor="middle">SEM MENSALIDADE</text>
  </g>
</svg>
