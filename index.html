<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="canonical" href="https://blaxxpontos.com.br/" />
    <meta name="theme-color" content="#0A0A0A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BlaXx" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- SEO — meta description é o snippet que o Google mostra no resultado.
         Limite prático: ~155 caracteres. Mais que isso é truncado com "…" -->
    <title>BlaXx Rewards — pontos viram Pix · cashback premium</title>
    <meta name="description" content="Programa de pontos premium do Brasil. Acumule comprando em parceiros, troque em PIX, milhas ou voucher. Sem mensalidade, sem letra miúda." />
    <meta name="keywords" content="cashback, pontos, programa de fidelidade, pix, milhas, blaxx, brasil, fintech" />
    <meta name="author" content="BlaXx Rewards" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large" />

    <!-- Open Graph (Facebook/LinkedIn/WhatsApp preview) -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:site_name" content="BlaXx Rewards" />
    <meta property="og:title" content="BlaXx Rewards — pontos viram Pix" />
    <meta property="og:description" content="Programa de pontos premium do Brasil. Cashback em PIX, milhas, hospedagem e mais. Sem mensalidade." />
    <meta property="og:url" content="https://blaxxpontos.com.br/" />
    <!-- OG image: SVG funciona em LinkedIn/Twitter/Slack/WhatsApp. Facebook às vezes
         prefere PNG raster — quando tiver `rsvg-convert` ou ImageMagick disponível
         no pipeline, gerar /og-image.png 1200x630 a partir do SVG e trocar aqui. -->
    <meta property="og:image" content="https://blaxxpontos.com.br/og-image.svg" />
    <meta property="og:image:type" content="image/svg+xml" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="BlaXx Rewards — globo lime sobre fundo escuro" />

    <!-- Twitter / X cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BlaXx Rewards — pontos viram Pix" />
    <meta name="twitter:description" content="Programa de pontos premium do Brasil. Cashback em PIX, milhas, hospedagem e mais." />
    <meta name="twitter:image" content="https://blaxxpontos.com.br/og-image.svg" />

    <!-- JSON-LD: Organization + WebSite (Google rich results / sitelinks search). -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://blaxxpontos.com.br/#org",
          "name": "BlaXx Rewards",
          "url": "https://blaxxpontos.com.br/",
          "logo": "https://blaxxpontos.com.br/blaxx-icon.png",
          "sameAs": []
        },
        {
          "@type": "WebSite",
          "@id": "https://blaxxpontos.com.br/#site",
          "url": "https://blaxxpontos.com.br/",
          "name": "BlaXx Rewards",
          "publisher": { "@id": "https://blaxxpontos.com.br/#org" },
          "inLanguage": "pt-BR"
        }
      ]
    }
    </script>

    <!-- Space Grotesk self-hosted (subset latin, 22 KB cobre 400-700).
         Preload acelera o LCP: navegador começa download antes do CSS parsing. -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/space-grotesk-latin.woff2" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
